<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión Finalizada - Banca 360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <header class="header">
        <h1 class="header__logo">
            <a href="login.html" class="header__logo-link">
                <img src="assets/img/Banca360.png" alt="Banca 360" class="header__logo-img">
            </a>
        </h1>

        <div class="header__controls">
            <label class="theme-switch" aria-label="Cambiar tema">
                <input type="checkbox" id="btnTheme" class="theme-switch__checkbox">
                <span class="theme-switch__slider">
                    <span class="theme-switch__icon theme-switch__icon--sun">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </span>
                    <span class="theme-switch__icon theme-switch__icon--moon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </span>
                </span>
            </label>
        </div>
    </header>

    <main class="main-content" style="max-width: 500px; margin-top: 3em; margin-bottom: 3em; flex: 1;">

        <section class="form-card" aria-label="Confirmación de cierre de sesión" style="text-align: center; padding: 3em 2em;">
            
            <div style="font-size: 3.5rem; margin-bottom: 0.2em;">
                👋
            </div>
            
            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--color-primary); margin-bottom: 0.5em;">
                Desconexión Exitosa
            </h2>
            
            <p style="color: var(--color-text-muted); font-size: 0.95rem; margin-bottom: 2em; line-height: 1.6;">
                Tu sesión ha finalizado de forma segura.<br>Gracias por utilizar Banca 360.
            </p>

            <div class="pm-form__actions" style="justify-content: center;">
                <a href="login.html" class="btn btn--primary" style="text-decoration: none; display: inline-block; width: 100%; max-width: 250px;">
                    Volver al login
                </a>
            </div>

        </section>

    </main>

    <footer class="footer" style="padding: 1.5em; text-align: center;">
        <p class="footer__brand">Banca 360</p>
        <p class="footer__copy">© 2026 Banca 360. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
