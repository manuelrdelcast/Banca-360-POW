<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Movimiento - Banca 360</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>   
</head>  
<body class="dark">
    <!-- HEADER -->
    <header class="header">
        <h1 class="header__logo">
            <a href="inicio.html" class="header__logo-link">
                <img src="assets/img/Banca360.png" alt="Banca 360" class="header__logo-img">
            </a>
        </h1>

        <div class="header__controls">
            <button class="btn-theme" id="btnTheme" aria-label="Cambiar tema">
                <div class="theme-switch" id="themeSwitch">🌙</div>
            </button>
            <button class="btn-hamburger" id="btnMenu" aria-label="Abrir menú" aria-expanded="false">
                <span style="font-size:1.5rem; color:#fff;">☰</span>
            </button>
        </div>

        <nav class="nav" id="mainNav" aria-label="Navegación principal">
            <ul class="nav__list">
                <li class="nav__item"><a href="inicio.html" class="nav__link">Inicio/Resumen</a></li>
                <li class="nav__item"><a href="transferencias.html" class="nav__link">Transferencias</a></li>
                <li class="nav__item"><a href="pago-movil.html" class="nav__link">Pago Móvil</a></li>
                <li class="nav__item"><a href="depositos.html" class="nav__link">Depósitos</a></li>
                <li class="nav__item"><a href="historial.html" class="nav__link nav__link--active">Historial</a></li>
                <li class="nav__item"><a href="perfil.html" class="nav__link">Mi Perfil</a></li>
                <li class="nav__item">
                    <a href="sesion-finalizada.html" class="nav__link nav__link--logout">Cerrar Sesión</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <section class="form-section">
            <div style="text-align: center; margin-bottom: 1.5em;">
                <div id="dt-icon" class="transaction-item__icon" style="margin: 0 auto 0.5em; width: 3.5em; height: 3.5em; font-size: 1.2rem;">
                    -
                </div>
                <h2 class="form-section__title" style="margin-bottom: 0.2em;">Detalle de Transacción</h2>
                <div id="dt-amount" class="transaction-item__amount" style="font-size: 1.5rem;">Bs. 0.00</div>
            </div>

            <div class="pm-summary" style="margin-bottom: 2em; animation: none;">
                <dl class="pm-summary__list">
                    <div class="pm-summary__row">
                        <dt>Referencia</dt>
                        <dd id="dt-ref">#0000000000</dd>
                    </div>
                    <div class="pm-summary__row">
                        <dt>Fecha y Hora</dt>
                        <dd id="dt-fecha">--</dd>
                    </div>
                    <div class="pm-summary__row">
                        <dt>Concepto</dt>
                        <dd id="dt-concepto">--</dd>
                    </div>
                    <div class="pm-summary__row">
                        <dt>Tipo de Operación</dt>
                        <dd id="dt-tipo">--</dd>
                    </div>
                    <div class="pm-summary__row">
                        <dt>Estado</dt>
                        <dd style="color: var(--color-in);">✔️ Aprobado</dd>
                    </div>
                </dl>
            </div>

            <div class="form__actions" style="justify-content: center; flex-direction: column; gap: 1em;">
                <!-- Usando history.back() para regresar de donde vino el usuario -->
                <button onclick="window.history.back()" class="btn btn--secondary" style="width: 100%;">
                    ← Volver atrás
                </button>
            </div>
            
            <div style="text-align: center; margin-top: 1.5em;">
                <a href="#" style="color: var(--color-primary); font-size: 0.85rem; font-weight: 500; text-decoration: none;">⬇ Descargar Comprobante (PDF)</a>
            </div>
        </section>
    </main>

    <!-- Script para leer parámetros y actualizar la vista -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            
            const ref = params.get('ref') || 'Desconocido';
            const fecha = params.get('fecha') || 'Desconocido';
            const concepto = params.get('concepto') || 'Desconocido';
            const monto = params.get('monto') || '0.00';
            const tipo = params.get('tipo') || 'out'; // in o out
            
            document.getElementById('dt-ref').textContent = '#' + ref;
            document.getElementById('dt-fecha').textContent = fecha;
            document.getElementById('dt-concepto').textContent = concepto;
            
            const iconEl = document.getElementById('dt-icon');
            const amountEl = document.getElementById('dt-amount');
            const tipoEl = document.getElementById('dt-tipo');
            
            if (tipo === 'in') {
                iconEl.textContent = '↓';
                iconEl.className = 'transaction-item__icon transaction-item__icon--in';
                amountEl.textContent = '+ Bs. ' + parseFloat(monto).toLocaleString('en-US', {minimumFractionDigits: 2});
                amountEl.className = 'transaction-item__amount transaction-item__amount--in';
                tipoEl.textContent = 'Ingreso / Abono';
            } else {
                iconEl.textContent = '↑';
                iconEl.className = 'transaction-item__icon transaction-item__icon--out';
                amountEl.textContent = '- Bs. ' + parseFloat(monto).toLocaleString('en-US', {minimumFractionDigits: 2});
                amountEl.className = 'transaction-item__amount transaction-item__amount--out';
                tipoEl.textContent = 'Salida / Cargo';
            }
        });
    </script>
</body>
</html>
