<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preguntas de Seguridad - Banca 360</title>
    <script>
        // Aplicar el tema oscuro de inmediato
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        // Inyectar un bloqueador temporal de animaciones
        document.head.insertAdjacentHTML('beforeend', '<style id="bloqueo-animaciones">*, *::before, *::after { transition: none !important; }</style>');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>

    <header class="header">
        <h1 class="header__logo">
            <a href="index.html" class="header__logo-link">
                <img src="assets/img/Banca360.png" alt="Banca 360" class="header__logo-img">
            </a>
        </h1>

        <div class="header__controls">
            <label class="theme-switch" aria-label="Cambiar tema">
                <input type="checkbox" id="btnTheme" class="theme-switch__checkbox">
                <span class="theme-switch__slider">
                    <span class="theme-switch__icon theme-switch__icon--sun">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </span>
                    <span class="theme-switch__icon theme-switch__icon--moon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </span>
                </span>
            </label>
        </div>
    </header>

    <main class="main-content" style="max-width: 600px; margin-top: 2em;">
        
        <section class="page-header" aria-label="Título de sección" style="justify-content: center; margin-bottom: 1em;">
            <div class="page-header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" class="bi bi-shield-lock-fill" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5"/>
                </svg>
            </div>
            <div style="text-align: center;">
                <h2 class="page-header__title">Preguntas de Seguridad</h2>
                <p class="page-header__subtitle">Configura tus opciones de recuperación</p>
            </div>
        </section>

        <section class="form-card" aria-label="Formulario de preguntas de seguridad">
            <form action="index.html" method="GET" class="pm-form">

                <fieldset class="pm-form__group">
                    <legend class="pm-form__legend">Primera Pregunta</legend>
                    <div class="pm-form__field">
                        <label for="pregunta1" class="pm-form__label">Selecciona una pregunta</label>
                        <div class="pm-form__select-wrap">
                            <select id="pregunta1" name="pregunta1" class="pm-form__select" required>
                                <option value="" disabled selected>Selecciona una opción</option>
                                <option value="p1_1">¿Cuál es el nombre de tu primera mascota?</option>
                                <option value="p1_2">¿En qué ciudad naciste?</option>
                                <option value="p1_3">¿Cuál es el nombre de tu escuela primaria?</option>
                                <option value="p1_4">¿Cuál es tu película favorita?</option>
                                <option value="p1_5">¿Cómo se llama tu mejor amigo de la infancia?</option>
                                <option value="p1_6">¿Cuál es el modelo de tu primer carro?</option>
                            </select>
                            <span class="pm-form__select-arrow">▼</span>
                        </div>
                    </div>
                    <div class="pm-form__field">
                        <input type="text" name="respuesta1" class="pm-form__input" placeholder="Tu respuesta aquí" required>
                    </div>
                </fieldset>

                <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 0.5em 0;">

                <fieldset class="pm-form__group">
                    <legend class="pm-form__legend">Segunda Pregunta</legend>
                    <div class="pm-form__field">
                        <label for="pregunta2" class="pm-form__label">Selecciona una pregunta</label>
                        <div class="pm-form__select-wrap">
                            <select id="pregunta2" name="pregunta2" class="pm-form__select" required>
                                <option value="" disabled selected>Selecciona una opción</option>
                                <option value="p2_1">¿Dónde se conocieron tus padres?</option>
                                <option value="p2_2">¿Cuál es el nombre de tu abuela materna?</option>
                                <option value="p2_3">¿Cuál era el nombre de tu primer jefe?</option>
                                <option value="p2_4">¿Cuál es tu plato de comida favorito?</option>
                                <option value="p2_5">¿En qué año te graduaste del colegio?</option>
                                <option value="p2_6">¿Cuál es el nombre de la calle donde creciste?</option>
                            </select>
                            <span class="pm-form__select-arrow">▼</span>
                        </div>
                    </div>
                    <div class="pm-form__field">
                        <input type="text" name="respuesta2" class="pm-form__input" placeholder="Tu respuesta aquí" required>
                    </div>
                </fieldset>

                <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 0.5em 0;">

                <fieldset class="pm-form__group">
                    <legend class="pm-form__legend">Tercera Pregunta</legend>
                    <div class="pm-form__field">
                        <label for="pregunta3" class="pm-form__label">Selecciona una pregunta</label>
                        <div class="pm-form__select-wrap">
                            <select id="pregunta3" name="pregunta3" class="pm-form__select" required>
                                <option value="" disabled selected>Selecciona una opción</option>
                                <option value="p3_1">¿Cuál es tu libro favorito?</option>
                                <option value="p3_2">¿A qué lugar te gustaría viajar?</option>
                                <option value="p3_3">¿Cuál es el nombre de tu cantante favorito?</option>
                                <option value="p3_4">¿Cuál fue tu primer trabajo?</option>
                                <option value="p3_5">¿Cómo se llama el hospital donde naciste?</option>
                                <option value="p3_6">¿Cuál es tu deporte favorito?</option>
                            </select>
                            <span class="pm-form__select-arrow">▼</span>
                        </div>
                    </div>
                    <div class="pm-form__field">
                        <input type="text" name="respuesta3" class="pm-form__input" placeholder="Tu respuesta aquí" required>
                    </div>
                </fieldset>

                <div class="pm-form__actions" style="margin-top: 1em; flex-direction: row; gap: 1em;">
                    <button type="submit" class="btn btn--primary" style="flex: 1;">Finalizar Registro</button>
                </div>

            </form>
        </section>

    </main>

    <footer class="footer">
        <div class="footer__grid">
            <div class="footer__col">
                <p class="footer__brand">Banca 360</p>
                <p class="footer__copy">© 2026 Banca 360.<br>Todos los derechos reservados.</p>
            </div>
            <div class="footer__col">
                <p class="footer__heading">Conoce</p>
                <ul class="footer__list">
                    <li><a href="#" class="footer__link">Acerca de Banca 360</a></li>
                    <li><a href="#" class="footer__link">Información</a></li>
                    <li><a href="#" class="footer__link">Términos y condiciones</a></li>
                </ul>
            </div>
            <div class="footer__col">
                <p class="footer__heading">Síguenos</p>
                <div class="footer__social">
                    <a href="#" class="footer__social-link" aria-label="Instagram">
                        <img src="assets/img/instagram.svg" alt="Instagram" class="footer__social-icon">
                    </a>
                    <a href="#" class="footer__social-link" aria-label="Facebook">
                        <img src="assets/img/facebook.svg" alt="Facebook" class="footer__social-icon">
                    </a>
                    <a href="#" class="footer__social-link" aria-label="LinkedIn">
                        <img src="assets/img/linkedin.svg" alt="LinkedIn" class="footer__social-icon">
                    </a>
                    <a href="#" class="footer__social-link" aria-label="YouTube">
                        <img src="assets/img/youtube.svg" alt="YouTube" class="footer__social-icon">
                    </a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
