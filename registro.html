<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Banca 360</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
       <a href="index.html"><img src="assets/img/Banca360.png" alt="Banca 360"></a>
       <h2 class="Dashboard">Registro</h2>
    </header>

    <main style="padding: 20px; max-width: 400px; margin: auto;">
        <form action="preguntas-seguridad.html" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required style="padding: 8px;">

            <label for="identificacion">Cédula de Identidad:</label>
            <input type="text" id="identificacion" name="identificacion" required style="padding: 8px;">

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required style="padding: 8px;">

            <button type="submit" style="padding: 10px; background-color: LightGreen; border: none; font-weight: bold; cursor: pointer;">Registrarse</button>
        </form>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="login.html" style="color: darkgreen;">Ya tengo cuenta</a>
        </div>
    </main>
</body>
</html>
