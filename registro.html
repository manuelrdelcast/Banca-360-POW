<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Banca 360</title>
    <script>
        // Aplicar el tema oscuro de inmediato
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        // Inyectar un bloqueador temporal de animaciones
        document.head.insertAdjacentHTML('beforeend', '<style id="bloqueo-animaciones">*, *::before, *::after { transition: none !important; }</style>');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>

    <header class="header">
        <h1 class="header__logo">
            <a href="login.html" class="header__logo-link">
                <img src="assets/img/Banca360.png" alt="Banca 360" class="header__logo-img">
            </a>
        </h1>

        <div class="header__controls">
            <label class="theme-switch" aria-label="Cambiar tema">
                <input type="checkbox" id="btnTheme" class="theme-switch__checkbox">
                <span class="theme-switch__slider">
                    <span class="theme-switch__icon theme-switch__icon--sun">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </span>
                    <span class="theme-switch__icon theme-switch__icon--moon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </span>
                </span>
            </label>
        </div>
    </header>

    <main class="main-content" style="max-width: 500px; margin-top: 2em;">
        
        <section class="page-header" aria-label="Título de sección" style="justify-content: center; margin-bottom: 1em;">
            <div class="page-header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" class="bi bi-person-fill-add" viewBox="0 0 16 16">
                    <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 0 1-1 0v-1h-1a.5.5 0 0 1 0-1h1v-1a.5.5 0 0 1 1 0m-2-6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                    <path d="M2 13c0 1 1 1 1 1h5.256A4.5 4.5 0 0 1 8 12.5a4.5 4.5 0 0 1 1.544-3.393Q8.844 9.002 8 9c-5 0-6 3-6 4"/>
                </svg>
            </div>
            <div style="text-align: center;">
                <h2 class="page-header__title">Crear Cuenta</h2>
                <p class="page-header__subtitle">Únete a Banca 360</p>
            </div>
        </section>

        <section class="form-card" aria-label="Formulario de registro">
            <form action="preguntas-seguridad.html" method="GET" class="pm-form">

                <div class="pm-form__field">
                    <label for="nombre" class="pm-form__label">Nombre Completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        class="pm-form__input" 
                        placeholder="Ej: Juan Pérez" 
                        required
                    >
                </div>

                <section class="pm-form__group pm-form__group--split">
                    <!-- Selector tipo de documento -->
                    <div class="pm-form__field">
                        <label for="tipoDoc" class="pm-form__label">Tipo</label>
                        <div class="pm-form__select-wrap">
                            <select id="tipoDoc" name="tipoDoc" class="pm-form__select" required>
                                <option value="">--</option>
                                <option value="V">V</option>
                                <option value="E">E</option>
                                <option value="J">J</option>
                                <option value="R">R</option>
                            </select>
                            <span class="pm-form__select-arrow">▾</span>
                        </div>
                        <span class="pm-form__error" id="tipoDocError"></span>
                    </div>

                    <!-- Número de documento -->
                    <div class="pm-form__field pm-form__field--grow">
                        <label for="numDoc" class="pm-form__label">Número de documento</label>
                        <input
                            type="text"
                            id="numDoc"
                            name="numDoc"
                            class="pm-form__input"
                            placeholder="Ej: 1234567890"
                            maxlength="10"
                            inputmode="numeric"
                            required
                        >
                        <span class="pm-form__error" id="numDocError"></span>
                    </div>
                </section>

                <!-- Número de teléfono -->
                <fieldset class="pm-form__group pm-form__group--split">

                    <!-- Selector prefijo -->
                    <div class="pm-form__field">
                        <label for="prefijo" class="pm-form__label">Prefijo</label>
                        <div class="pm-form__select-wrap">
                            <select id="prefijo" name="prefijo" class="pm-form__select" required>
                                <option value="">---</option>
                                <option value="0412">0412</option>
                                <option value="0414">0414</option>
                                <option value="0416">0416</option>
                                <option value="0422">0422</option>
                                <option value="0424">0424</option>
                            </select>
                            <span class="pm-form__select-arrow">▾</span>
                        </div>
                        <span class="pm-form__error" id="prefijoError"></span>
                    </div>

                    <!-- Número de teléfono (7 dígitos restantes) -->
                    <div class="pm-form__field pm-form__field--grow">
                        <label for="numTelefono" class="pm-form__label">Número de teléfono</label>
                        <input
                            type="text"
                            id="numTelefono"
                            name="numTelefono"
                            class="pm-form__input"
                            placeholder="Ej: 1234567"
                            minlength="7"
                            maxlength="7"
                            inputmode="numeric"
                            required
                        >
                        <span class="pm-form__error" id="numTelefonoError"></span>
                    </div>
                </fieldset>               

                <div class="pm-form__field">
                    <label for="email" class="pm-form__label">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="pm-form__input" 
                        placeholder="Ej: correo@ejemplo.com" 
                        required
                    >
                </div>
                <div class="pm-form__field">
                    <label for="password" class="pm-form__label">Contraseña</label>
                    <span class="pm-form__hint">Debe ser un pin de al menos 6 dígitos.</span>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" 
                            id="password" 
                            name="password" 
                            class="pm-form__input" 
                            placeholder="Ingresa tu nueva contraseña" 
                            required 
                            inputmode="numeric"
                            pattern="[0-9]{6,}"
                            title="La contraseña debe contener solo números y un mínimo de 6 dígitos."
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                            style="padding-right: 2.5rem;">
                        <button type="button" class="toggle-password" data-target="password" style="position: absolute; right: 0.75rem; background: none; border: none; cursor: pointer; color: var(--color-text-muted); display: flex; padding: 0;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pm-form__field">
                    <label for="confirmarPassword" class="pm-form__label">Confirmar Contraseña</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" 
                            id="confirmarPassword" 
                            name="confirmarPassword" 
                            class="pm-form__input" 
                            placeholder="Repite tu nueva contraseña" 
                            required 
                            inputmode="numeric"
                            pattern="[0-9]{6,}"
                            title="La contraseña debe contener solo números y un mínimo de 6 dígitos."
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                            style="padding-right: 2.5rem;">
                        <button type="button" class="toggle-password" data-target="confirmarPassword" style="position: absolute; right: 0.75rem; background: none; border: none; cursor: pointer; color: var(--color-text-muted); display: flex; padding: 0;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </div>
                

                <div class="pm-form__actions" style="margin-top: 1em;">
                    <button type="submit" class="btn btn--primary" style="width: 100%;">
                        Registrarse
                    </button>
                </div>

            </form>

            <div style="margin-top: 1.5em; text-align: center;">
                <a href="login.html" style="color: var(--color-primary); text-decoration: none; font-weight: 600; transition: color 0.3s ease;" onmouseover="this.style.color='var(--color-primary-dark)'" onmouseout="this.style.color='var(--color-primary)'">Ya tengo cuenta</a>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="footer__grid">
            <div class="footer__col">
                <p class="footer__brand">Banca 360</p>
                <p class="footer__copy">© 2026 Banca 360.<br>Todos los derechos reservados.</p>
            </div>
            <div class="footer__col">
                <p class="footer__heading">Conoce</p>
                <ul class="footer__list">
                    <li><a href="#" class="footer__link">Acerca de Banca 360</a></li>
                    <li><a href="#" class="footer__link">Información</a></li>
                    <li><a href="#" class="footer__link">Términos y condiciones</a></li>
                </ul>
            </div>
            <div class="footer__col">
                <p class="footer__heading">Síguenos</p>
                <div class="footer__social">
                    <a href="#" class="footer__social-link" aria-label="Instagram">
                        <img src="assets/img/instagram.svg" alt="Instagram" class="footer__social-icon">
                    </a>
                    <a href="#" class="footer__social-link" aria-label="Facebook">
                        <img src="assets/img/facebook.svg" alt="Facebook" class="footer__social-icon">
                    </a>
                    <a href="#" class="footer__social-link" aria-label="LinkedIn">
                        <img src="assets/img/linkedin.svg" alt="LinkedIn" class="footer__social-icon">
                    </a>
                    <a href="#" class="footer__social-link" aria-label="YouTube">
                        <img src="assets/img/youtube.svg" alt="YouTube" class="footer__social-icon">
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
